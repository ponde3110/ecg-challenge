<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ECGチャレンジ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#050508;color:#fff;font-family:'Courier New',monospace;overflow-y:auto;overflow-x:hidden;min-height:100dvh;width:100vw;display:flex;justify-content:center;align-items:flex-start;}
#game-container{position:relative;width:100%;max-width:430px;min-height:100dvh;height:auto;overflow:visible;background:#0a0a12;display:flex;flex-direction:column;}

/* Header */
#ui{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;flex-shrink:0;
  background:linear-gradient(180deg,rgba(0,10,30,0.95) 0%,rgba(0,6,18,0.85) 100%);
  border-bottom:1px solid rgba(0,180,255,0.12);
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
#face-display{
  font-size:12px;letter-spacing:2px;min-width:60px;
  font-family:'Courier New',monospace;
  color:rgba(0,255,136,0.85);
  text-shadow:0 0 8px rgba(0,255,136,0.4);
}

#stage-display{
  font-size:12px;color:#00ccff;letter-spacing:2px;text-align:right;min-width:80px;
  font-family:'Courier New',monospace;
  text-shadow:0 0 10px rgba(0,200,255,0.6);
}
#hi-display{display:none;}
#combo-display{display:none;}
/* HUD中央 ステージ進捗バー */
#hud-progress-wrap{
  flex:1;margin:0 10px;height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:3px;overflow:hidden;
  border:1px solid rgba(0,180,255,0.18);
}
#hud-progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,#00ccff,#00ff88);
  border-radius:3px;
  transition:width 0.4s ease;
  box-shadow:0 0 6px rgba(0,200,255,0.5);
}

/* ECG falling area */
#ecg-area{position:relative;flex:0 0 auto;width:100%;height:auto;overflow:hidden;}
#canvas{position:relative;display:block;width:100%;}

/* Bottom control panel */
#control-panel{flex-shrink:0;display:flex;flex-direction:column;background:linear-gradient(180deg,rgb(4,8,22) 0%,rgb(6,12,28) 100%);box-shadow:0 -2px 12px rgba(0,0,0,0.4);}

/* Diagnosis labels */
#labels-row{display:flex;flex-direction:column;justify-content:center;align-items:stretch;gap:6px;padding:8px 10px 10px;}
.diag-label{
  font-size:12px;color:#111;
  background:#ffffff;
  border:1px solid rgba(200,210,230,0.8);
  border-bottom:2px solid rgba(160,180,220,0.9);
  border-radius:10px;padding:11px 16px;
  white-space:normal;word-break:break-all;width:100%;
  text-align:center;line-height:1.35;
  font-family:'Courier New',monospace;
  font-weight:bold;letter-spacing:1px;
  box-shadow:0 2px 8px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.9);
  transition:background .12s,transform .08s,box-shadow .12s;
  user-select:none;cursor:pointer;position:relative;overflow:visible;
}
.diag-label:active{
  background:#e8edf5;
  transform:scale(0.97);
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}
.diag-label.hit-correct{
  background:#b8f0d0 !important;
  border-color:#008833 !important;
  border-bottom-color:#005522 !important;
  color:#003311 !important;
  box-shadow:0 2px 8px rgba(0,0,0,0.2) !important;
  position:relative;
}
.diag-label.hit-correct::after{
  content:'正解';
  position:absolute;top:50%;left:12px;transform:translateY(-50%);
  font-size:12px;font-weight:900;white-space:nowrap;
  font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;
  letter-spacing:3px;
  color:#fff;
  background:linear-gradient(135deg,#e03030 0%,#cc1a1a 60%,#b01010 100%);
  padding:3px 10px 4px;
  border-radius:5px;
  box-shadow:0 3px 12px rgba(180,0,0,0.6),inset 0 1px 0 rgba(255,120,120,0.3),inset 0 -1px 0 rgba(0,0,0,0.3);
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
  animation:popInCorrect 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popInCorrect{
  0%{transform:translateY(-50%) scale(0.3);opacity:0;}
  55%{transform:translateY(-50%) scale(1.1);opacity:1;}
  75%{transform:translateY(-50%) scale(0.97);}
  100%{transform:translateY(-50%) scale(1);opacity:1;}
}
.diag-label.hit-wrong{
  background:#f8b0b0 !important;
  border-color:#cc0000 !important;
  border-bottom-color:#990000 !important;
  color:#880000 !important;
  box-shadow:0 2px 8px rgba(0,0,0,0.2) !important;
}

/* 鬼面進捗グラフ */
.oni-progress{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:4px 0;width:100%;
}
.oni-prog-label{
  font-size:11px;color:rgba(255,100,0,0.9);
  font-family:'Courier New',monospace;letter-spacing:2px;
}
.oni-prog-bar-wrap{
  width:90%;height:8px;background:rgba(255,255,255,0.1);
  border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,100,0,0.4);
}
.oni-prog-bar{
  height:100%;
  background:linear-gradient(90deg,#ff4400,#ff8800);
  border-radius:4px;
  transition:width 0.4s ease;
  box-shadow:0 0 8px rgba(255,100,0,0.6);
}
#hint-area{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  width:90%;max-width:90%;
  margin:8px auto 4px;
  padding:8px 20px 10px;
  background:rgba(255,200,40,0.07);
  border:none;
  border-left:3px solid rgba(255,200,0,0.7);
  border-right:3px solid rgba(255,200,0,0.7);
  border-radius:3px;
  box-shadow:0 0 18px rgba(255,180,0,0.15),0 2px 8px rgba(0,0,0,0.4),inset 0 0 14px rgba(255,160,0,0.05);
  overflow:visible;
  transition:opacity .3s,visibility .3s;
  pointer-events:none;
}
#hint-area::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,200,0,0.55),transparent);
}
#hint-area::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,180,0,0.35),transparent);
}
/* 1行目：ヒントラベル（常時表示） */
#hint-label{
  font-size:7px;color:rgba(255,200,0,0.5);letter-spacing:5px;
  font-family:'Courier New',monospace;
  text-align:center;
}
/* 2行目：ヒント本文 or ・・・ */
#hint-text{
  font-size:14px;color:#fff8dc;letter-spacing:1px;
  font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;font-weight:bold;
  text-shadow:0 0 10px rgba(255,180,0,0.25),0 1px 3px rgba(0,0,0,0.7);
  text-align:center;line-height:1.5;
  white-space:normal;overflow:visible;text-overflow:clip;
  max-width:100%;
  position:relative;z-index:1;
}
#hint-area.hidden{opacity:0;pointer-events:none;visibility:hidden;}
#hint-stage{display:none;}

/* Overlay */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:0;background:rgba(0,0,8,0.97);z-index:20;overflow-y:auto;}
#overlay-stars{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#overlay > *:not(#overlay-stars){position:relative;z-index:1;}
#overlay-top{
  flex-shrink:0;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:4px 16px 0;
  position:relative;
}
#top-img{
  width:min(380px,96%);
  max-height:min(260px,38vh);
  object-fit:contain;
  border-radius:16px;
  opacity:0.97;
  filter:drop-shadow(0 0 20px rgba(0,220,255,0.4)) drop-shadow(0 0 8px rgba(0,255,136,0.25));
  animation:topImgPulse 4s ease-in-out infinite;
}
@keyframes topImgPulse{
  0%,100%{filter:drop-shadow(0 0 20px rgba(0,220,255,0.4)) drop-shadow(0 0 8px rgba(0,255,136,0.25));}
  50%{filter:drop-shadow(0 0 32px rgba(0,220,255,0.65)) drop-shadow(0 0 14px rgba(0,255,136,0.4));}
}
/* メダル */
#medal-row{display:flex;justify-content:center;align-items:center;gap:20px;padding:0;margin-top:-8px;flex-shrink:0;}
#medal-row2{display:flex;justify-content:center;align-items:center;gap:20px;padding:0;margin-top:10px;flex-shrink:0;}
#medal-row3{display:flex;justify-content:center;align-items:center;gap:20px;padding:0;margin-top:10px;flex-shrink:0;}
.medal-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.medal-img{width:88px;height:88px;object-fit:contain;opacity:0.3;filter:grayscale(0.6);transition:opacity .5s,filter .5s,transform .12s;border-radius:50%;cursor:pointer;}
.medal-img.earned:hover{transform:scale(1.08);filter:drop-shadow(0 0 20px rgba(255,220,0,0.7));}
.medal-img.earned:active{transform:scale(0.96);}
.medal-img.earned{opacity:1;filter:none;animation:medalGlow 2.5s ease-in-out infinite;}
@keyframes medalGlow{0%,100%{filter:drop-shadow(0 0 7px rgba(255,220,0,0.5));}50%{filter:drop-shadow(0 0 16px rgba(255,220,0,0.9));}}
.medal-label{font-size:7px;color:rgba(255,255,255,0.28);letter-spacing:1px;font-family:'Courier New',monospace;}
/* スライドショー */
/* 説明文 */
#overlay-desc{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:stretch;gap:14px;
  padding:30px 20px 40px;
}
  width:min(320px,88%);
}
.desc-line{
  display:flex;align-items:baseline;justify-content:center;gap:6px;
  white-space:nowrap;
}
.desc-num{
  font-size:52px;font-weight:900;
  font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;
  color:#00ccff;line-height:1;letter-spacing:-1px;
  text-shadow:0 0 20px rgba(0,200,255,0.6),0 0 40px rgba(0,200,255,0.3);
}
.desc-num-ja{
  font-size:46px;font-weight:900;
  font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;
  color:#00ccff;line-height:1;letter-spacing:1px;
  text-shadow:0 0 20px rgba(0,200,255,0.6),0 0 40px rgba(0,200,255,0.3);
}
.desc-icon{font-size:32px;line-height:1;}
.desc-text{
  font-size:17px;font-weight:bold;
  font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;
  color:rgba(255,255,255,0.88);letter-spacing:1px;
  text-shadow:0 1px 8px rgba(0,0,0,0.5);
}
/* STARTボタンエリア */
#overlay-bottom{
  flex-shrink:0;
  padding:36px 16px 12px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  width:100%;
}
#start-btn{
  width:min(280px,80%);
  cursor:pointer;
  display:block;
  border:none;background:none;padding:0;
  transition:transform .12s, filter .12s;
  filter:drop-shadow(0 0 12px rgba(0,255,136,0.3));
}
#start-btn:hover{transform:scale(1.04);filter:drop-shadow(0 0 20px rgba(0,255,136,0.55));}
#start-btn:active{transform:scale(0.97);}

/* 免責エリア：画面下端に固定 */
#overlay-disclaimer{
  position:sticky;bottom:0;
  width:100%;
  padding:8px 16px 12px;
  background:linear-gradient(0deg,rgba(0,0,8,1) 70%,rgba(0,0,8,0));
  margin-top:auto;
}
.score-final{font-size:36px;color:#fff;letter-spacing:2px;}
.label-small{font-size:10px;color:#556;letter-spacing:3px;}

/* ─── 横向き対応 ─── */
#reset-btn{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:50%;width:32px;height:32px;
  color:rgba(255,255,255,0.45);
  font-size:16px;line-height:1;
  cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,transform .12s;
  padding:0;
}
#reset-btn:hover{
  background:rgba(255,60,60,0.25);
  border-color:rgba(255,80,80,0.5);
  color:rgba(255,120,120,0.9);
  transform:rotate(-20deg) scale(1.1);
}
#reset-btn:active{ transform:rotate(-40deg) scale(0.95); }

/* 虫眼鏡オーバーレイ */
#magnifier-overlay{
  display:none;
  position:absolute;
  inset:0;
  z-index:25;
  background:#000;
  cursor:zoom-out;
  touch-action:none;
}
#magnifier-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}
</style>
</head>
<body>
<div id="game-container">

  <div id="ui">
    <div id="face-display">表面</div>
    <div id="hud-progress-wrap"><div id="hud-progress-bar"></div></div>
    <div id="stage-display">ステージ<span id="level">1</span></div>
  </div>

  <div id="ecg-area">
    <canvas id="canvas"></canvas>
    <div id="magnifier-overlay">
      <canvas id="magnifier-canvas"></canvas>
    </div>
  </div>

  <div id="control-panel">
    <div id="hint-area">
      <div id="hint-stage"></div>
      <div id="hint-label">ヒ ン ト</div>
      <span id="hint-text"></span>
    </div>
    <div id="labels-row"></div>
  </div>

  <div id="overlay">
    <canvas id="overlay-stars"></canvas>
    <div id="overlay-top">
      <img id="top-img" src="top.webp" alt="" onerror="this.style.display='none'">
      <button id="reset-btn" onclick="resetAllRecords()" title="記録をリセット">↺</button>
    </div>
      <div id="overlay-desc">
      <div class="desc-line">
        <span class="desc-text">計 </span><span class="desc-num">100</span><span class="desc-text"> 心電図 </span><span class="desc-num">9</span><span class="desc-text"> メダル</span>
      </div>
    </div>
    <div id="medal-row">
      <div class="medal-wrap"><img src="medal1.webp" class="medal-img" id="medal1-img" alt="" onclick="onMedalClick(1)"><div class="medal-label">表面10クリア</div></div>
      <div class="medal-wrap"><img src="medal2.webp" class="medal-img" id="medal2-img" alt="" onclick="onMedalClick(2)"><div class="medal-label">表面30クリア</div></div>
      <div class="medal-wrap"><img src="medal3.webp" class="medal-img" id="medal3-img" alt="" onclick="onMedalClick(3)"><div class="medal-label">表面100クリア</div></div>
    </div>
    <div id="medal-row2">
      <div class="medal-wrap"><img src="medal4.webp" class="medal-img" id="medal4-img" alt="" onclick="onMedalClick(4)"><div class="medal-label">裏面10クリア</div></div>
      <div class="medal-wrap"><img src="medal5.webp" class="medal-img" id="medal5-img" alt="" onclick="onMedalClick(5)"><div class="medal-label">裏面30クリア</div></div>
      <div class="medal-wrap"><img src="medal6.webp" class="medal-img" id="medal6-img" alt="" onclick="onMedalClick(6)"><div class="medal-label">裏面100クリア</div></div>
    </div>
    <div id="medal-row3">
      <div class="medal-wrap"><img src="medal7.webp" class="medal-img" id="medal7-img" alt="" onclick="onMedalClick(7)"><div class="medal-label">鬼面10クリア</div></div>
      <div class="medal-wrap"><img src="medal8.webp" class="medal-img" id="medal8-img" alt="" onclick="onMedalClick(8)"><div class="medal-label">鬼面30クリア</div></div>
      <div class="medal-wrap"><img src="medal9.webp" class="medal-img" id="medal9-img" alt="" onclick="onMedalClick(9)"><div class="medal-label">鬼面100クリア</div></div>
    </div>
  
    <div id="overlay-bottom">
      <img id="start-btn" src="start.webp" alt="START" onclick="handleStartBtn()">
      <div style="font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1px;font-family:'Courier New',monospace;">© 2026 ponde3110</div>
    </div>
    <div id="overlay-disclaimer">
      <div style="font-size:8px;color:rgba(255,255,255,0.2);text-align:left;line-height:1.8;font-family:'Helvetica Neue','Hiragino Sans','Yu Gothic',sans-serif;">
        心電図の解釈は必ずしも一義的ではないため，本アプリに掲載された情報に基づいて生じたいかなる損害について一切の責任を負いかねます．本アプリに含まれるすべてのコンテンツは，著作権法により保護されています．
      </div>
    </div>
  </div>

</div>
<script>
// ヒント非表示レベル閾値
const HINT_HIDE_LEVEL = 3;

// ─── ステージ定義 ─────────────────────────────────────────────────────────
// hint:true=常時表示  slime/spotlight/invert:エフェクト  q:そのステージの問題数
const STAGE_DEFS = [
  // ─ 表面 ST1〜10 ─
  { st:1,  slime:false, spotlight:false, invert:false,   q:10, qRange:[1,10],  slimeCount:0, label:'表面',   head:'STAGE 1',    sub:'心電図1〜10',                          color:'#00ff88' },
  { st:2,  slime:true,  spotlight:false, invert:false,   q:10, qRange:[1,10],  slimeCount:3, label:'表面',   head:'STAGE 2',    sub:'心電図1〜10　スライム3匹！',            color:'#88ffaa' },
  { st:3,  slime:false, spotlight:true,  invert:false,   q:10, qRange:[1,10],  slimeCount:0, label:'表面',   head:'STAGE 3',    sub:'心電図1〜10　スポットライト！',         color:'#ffcc00' },
  { st:4,  slime:false, spotlight:false, invert:false,   q:10, qRange:[1,30],  slimeCount:0, label:'表面',   head:'STAGE 4',    sub:'心電図1〜30',                          color:'#00ccff' },
  { st:5,  slime:true,  spotlight:false, invert:false,   q:10, qRange:[1,30],  slimeCount:6, label:'表面',   head:'STAGE 5',    sub:'心電図1〜30　スライム6匹！',            color:'#88ffaa' },
  { st:6,  slime:false, spotlight:true,  invert:false,   q:10, qRange:[1,30],  slimeCount:0, label:'表面',   head:'STAGE 6',    sub:'心電図1〜30　スポットライト！',         color:'#ffcc00' },
  { st:7,  slime:false, spotlight:false, invert:false,   q:10, qRange:[1,100], slimeCount:0, label:'表面',   head:'STAGE 7',    sub:'心電図1〜100',                         color:'#00aaff' },
  { st:8,  slime:true,  spotlight:false, invert:false,   q:10, qRange:[1,100], slimeCount:9, label:'表面',   head:'STAGE 8',    sub:'心電図1〜100　スライム9匹！',           color:'#ff9900' },
  { st:9,  slime:false, spotlight:true,  invert:false,   q:10, qRange:[1,100], slimeCount:0, label:'表面',   head:'STAGE 9',    sub:'心電図1〜100　スポットライト！',        color:'#ffcc00' },
  // ─ 裏面 ST11〜20 ─
  { st:10, slime:false, spotlight:false, invert:true,    q:5, qRange:[1,10],  slimeCount:0, label:'裏面',   head:'STAGE 1',    sub:'上下反転　心電図1〜10',                    color:'#ff88ff' },
  { st:11, slime:true,  spotlight:false, invert:true,    q:5, qRange:[1,10],  slimeCount:3, label:'裏面',   head:'STAGE 2',    sub:'上下反転　スライム3匹！',                  color:'#cc88ff' },
  { st:12, slime:false, spotlight:true,  invert:true,    q:5, qRange:[1,10],  slimeCount:0, label:'裏面',   head:'STAGE 3',    sub:'上下反転　スポットライト！',                color:'#ff66cc' },
  { st:13, slime:false, spotlight:false, invert:true,    q:5, qRange:[1,30],  slimeCount:0, label:'裏面',   head:'STAGE 4',    sub:'上下反転　心電図1〜30',                    color:'#aa88ff' },
  { st:14, slime:true,  spotlight:false, invert:true,    q:5, qRange:[1,30],  slimeCount:6, label:'裏面',   head:'STAGE 5',    sub:'上下反転　スライム6匹！',                  color:'#cc44ff' },
  { st:15, slime:false, spotlight:true,  invert:true,    q:5, qRange:[1,30],  slimeCount:0, label:'裏面',   head:'STAGE 6',    sub:'上下反転　スポットライト！',                color:'#ff4488' },
  { st:16, slime:false, spotlight:false, invert:true,    q:5, qRange:[1,100], slimeCount:0, label:'裏面',   head:'STAGE 7',    sub:'上下反転　心電図1〜100',                   color:'#8888ff' },
  { st:17, slime:true,  spotlight:false, invert:true,    q:5, qRange:[1,100], slimeCount:9, label:'裏面',   head:'STAGE 8',    sub:'上下反転　スライム9匹！',                  color:'#ff2266' },

const BASE_SPEED = 0.14;
const ACCEL      = 0.018;

let questionCount = 0; // 正解した問題数（全ステージ通算）
let stageQCount   = 0; // 現在ステージ内の正解数

function getStageDef(){
  let used = 0;
  for(const d of STAGE_DEFS){
    used += d.q;
    if(questionCount < used) return d;
  }
  // ST11以降は最終ステージを繰り返す
  return STAGE_DEFS[STAGE_DEFS.length - 1];
}

function getStage(){ return getStageDef().st; }

function waveSpeed(){
  if(getStageDef().st === 19) return BASE_SPEED * 0.65; // 鬼面はやや遅く
  return BASE_SPEED;
}

// 選択肢をシャッフルするユーティリティ
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

const STAR_LAYERS_ECG = [
  { speed: 0.06, count: 50, rMin: 0.3, rMax: 0.9, aMin: 0.2, aMax: 0.5 },
  { speed: 0.15, count: 30, rMin: 0.6, rMax: 1.3, aMin: 0.4, aMax: 0.7 },

];
let _ecgStarCaches = [null, null, null];

function buildEcgStarCaches() {
  if (_ecgStarBuilt && _ecgStarCaches[0]) return;
  _ecgStarBuilt = true;
  STAR_LAYERS_ECG.forEach((layer, li) => {
    const TH = (H || 800) * 4;
    const cW = (W || 400);
    const oc = document.createElement('canvas');
    oc.width = cW; oc.height = TH;
    const c = oc.getContext('2d');
    c.clearRect(0, 0, cW, TH);
    // ネビュラ（遠景のみ）
    if (li === 0) {
      c.save(); c.globalCompositeOperation = 'screen';
      const blobs = [
        { x: cW*0.2, y: TH*0.15, r: cW*0.55, hue: 220, a: 0.06 },
        { x: cW*0.75, y: TH*0.40, r: cW*0.50, hue: 260, a: 0.05 },
        { x: cW*0.45, y: TH*0.70, r: cW*0.60, hue: 200, a: 0.055 },
        { x: cW*0.15, y: TH*0.88, r: cW*0.48, hue: 180, a: 0.045 },
      ];
      for (const bl of blobs) {
        const g = c.createRadialGradient(bl.x, bl.y, 0, bl.x, bl.y, bl.r);
        g.addColorStop(0,   `hsla(${bl.hue},70%,35%,${bl.a})`);
        g.addColorStop(0.5, `hsla(${bl.hue},55%,22%,${bl.a*0.5})`);
        g.addColorStop(1,   'rgba(0,0,0,0)');
        c.fillStyle = g; c.beginPath(); c.arc(bl.x, bl.y, bl.r, 0, Math.PI*2); c.fill();
      }
      c.restore();
    }
    // 星を散りばめる
    for (let i = 0; i < layer.count * 4; i++) {
      const sx = Math.random() * cW;
      const sy = Math.random() * TH;
      const r  = layer.rMin + Math.random() * (layer.rMax - layer.rMin);
      const a  = layer.aMin + Math.random() * (layer.aMax - layer.aMin);
      c.beginPath(); c.arc(sx, sy, r, 0, Math.PI*2);
      // 少し青白い色味
      const bright = 200 + Math.floor(Math.random() * 55);
      const blue   = Math.min(255, bright + Math.floor(Math.random() * 30));
      c.fillStyle = `rgba(${bright},${bright},${blue},${a})`;
      c.fill();
      // 明るい星にグロー
      if (r > 1.3) {
        const g2 = c.createRadialGradient(sx, sy, 0, sx, sy, r * 3);
        g2.addColorStop(0,   `rgba(${bright},${bright},${blue},${a * 0.4})`);
        g2.addColorStop(1,   'rgba(0,0,0,0)');
        c.fillStyle = g2; c.beginPath(); c.arc(sx, sy, r * 3, 0, Math.PI*2); c.fill();
      }
    }
    _ecgStarCaches[li] = oc;
  });
}

// 流れ星
let ecgShootingStars = [];
let ecgShootingStarTimer = 2 + Math.random() * 4;

function spawnEcgShootingStar() {
  const fromLeft = Math.random() < 0.5;
  const angle = (Math.PI / 5) + Math.random() * (Math.PI / 6);
  const speed = 350 + Math.random() * 250;
  const len   = 60  + Math.random() * 80;
  const x = fromLeft ? -len : (W || 400) + len;
  const y = Math.random() * (H || 800) * 0.7;
  const vx = fromLeft ? Math.cos(angle) * speed : -Math.cos(angle) * speed;
  const vy = Math.abs(Math.sin(angle) * speed);
  ecgShootingStars.push({ x, y, vx, vy, len, life: 1.0,
    maxLife: 0.5 + Math.random() * 0.4, alpha: 0.85 + Math.random() * 0.15 });
}

function updateAndDrawEcgShootingStars(dt) {
  ecgShootingStarTimer -= dt / 1000;
  if (ecgShootingStarTimer <= 0) {
    spawnEcgShootingStar();
    ecgShootingStarTimer = 5 + Math.random() * 14;
  }
  for (let i = ecgShootingStars.length - 1; i >= 0; i--) {
    const s = ecgShootingStars[i];
    s.x += s.vx * (dt / 1000);
    s.y += s.vy * (dt / 1000);
    s.life -= (dt / 1000) / s.maxLife;
    if (s.life <= 0) { ecgShootingStars.splice(i, 1); continue; }
    const a  = s.life * s.alpha;
    const sp = Math.hypot(s.vx, s.vy);
    const nx = -s.vx / sp, ny = -s.vy / sp;
    const grad = ctx.createLinearGradient(s.x, s.y, s.x + nx * s.len, s.y + ny * s.len);
    grad.addColorStop(0,   `rgba(255,255,255,${a})`);
    grad.addColorStop(0.3, `rgba(200,220,255,${a * 0.6})`);
    grad.addColorStop(1,   'rgba(180,200,255,0)');
    ctx.save();
    ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x + nx * s.len, s.y + ny * s.len); ctx.stroke();
    ctx.globalAlpha = a; ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function resize(){

  const dpr = window.devicePixelRatio || 1;

  W = ecgArea.offsetWidth;
  // ecg-area は height:auto なので、ゲームに必要な高さをウィンドウから計算
  // ui(HUD)・hint-area・control-panel の実高を除いた残りをキャンバス高とする
  const uiH      = (document.getElementById('ui')            || {}).offsetHeight || 36;
  const hintH    = (document.getElementById('hint-area')     || {}).offsetHeight || 0;
  const cpH      = (document.getElementById('control-panel') || {}).offsetHeight || 0;
  const winH     = window.innerHeight;
  H = Math.max(winH - uiH - hintH - cpH, 300);

  // canvas サイズを設定（ecg-area の高さがこれで確定する）
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);

  // 見た目サイズ
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  // 座標系をCSSピクセル基準へ
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // シャープ化
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // 画面サイズ変更時に星キャッシュを再生成
  _ecgStarBuilt = false; _ecgStarCaches = [null,null,null];
  // ゲームオーバー中はcanvasサイズ調整のみ（心臓・放電位置は保持）
  if(typeof gameState !== 'undefined' && gameState === 'gameover') return;

  // 心臓サイズ・座標は resize 時に確定（心電図高は後で決まるのでここでは仮値）
  heartBaseSize = Math.min(W * 0.16, 65);

  // 向き変更時: currentWaveがあればサイズ・heart位置を再計算
  if(typeof currentWave !== 'undefined' && currentWave && currentWave.ready && currentWave.img){
    const ratio2 = currentWave.img.naturalWidth / currentWave.img.naturalHeight;
    currentWave.waveW = W;
    currentWave.h     = Math.min(W / ratio2, H * 0.62);
    currentWave.waveX = 0;
    currentWave.y     = 8;
    const hImgW2 = (heartImg.complete && heartImg.naturalWidth > 0) ? heartImg.naturalWidth * 0.5 : 50;
    heartBaseSize = hImgW2 / 2;
    const ecgBottom3 = currentWave.y + currentWave.h;
    const ecgRight3  = currentWave.waveX + currentWave.waveW;
    const areaBelow3 = H - ecgBottom3;
    heartY = Math.min(ecgBottom3 + Math.max(areaBelow3 * 0.15, 40), H - 60);
    heartX = ecgRight3 - hImgW2 / 2 - 4;
    // ヒントパネル位置を再調整
    const hintEl3 = document.getElementById('hint-area');
    if(hintEl3 && !hintEl3.classList.contains('hidden')){
      const panelH2 = hintEl3.offsetHeight || 80;
      const hintTop2 = heartY + (H - heartY) * 0.40;
      const clampedY2 = Math.min(hintTop2, H - panelH2 - 4);
      hintEl3.style.top = clampedY2 + 'px';
      hintEl3.style.transform = 'translateX(-50%)';
    }
  }
}

function pickQuestion(){
  const stageDef = getStageDef();
  const [minQ, maxQ] = stageDef.qRange || [1, QUESTIONS_RAW.length];
  const validIndices = [];
  for(let i=0;i<QUESTIONS.length;i++){
    const num = parseInt(QUESTIONS[i].img.replace('ecg/','').replace('.jpg',''));
    if(num>=minQ && num<=maxQ) validIndices.push(i);
  }
  let avail = validIndices.filter(i=>!usedIndices.includes(i));
  if(avail.length===0){ usedIndices=usedIndices.filter(i=>!validIndices.includes(i)); avail=validIndices; }
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedIndices.push(idx);
  return QUESTIONS[idx];
}

function buildLabels(q){
  labelsRow.innerHTML=''; labelData=[];
  q.choices.forEach(name=>{
    const el=document.createElement('div');
    el.className='diag-label';
    el.textContent=name;
    el.addEventListener('click', ()=>{
      if(gameState!=='playing'||answered) return;
      const lbl=labelData.find(l=>l.text===name);
      if(!lbl||lbl.hit) return;
      if(lbl.correct) onCorrect(lbl); else onWrong(lbl);
    });
    labelsRow.appendChild(el);
    labelData.push({text:name, correct:name===q.answer, el, hit:false});
  });
}

function rand50(){ return Math.random() < 0.5; }

function computeStageEffects(){
  const d = getStageDef();
  stageEffects = {
    slime:     d.slime     === 'rand' ? rand50() : d.slime,
    spotlight: d.spotlight === 'rand' ? rand50() : d.spotlight,
    invert:    d.invert    === 'rand' ? rand50() : d.invert,
  };
}

function spawnWave(q, resetDanger=false){
  const spd=waveSpeed();
  computeStageEffects();
  const rot = stageEffects.invert ? Math.PI : 0;
  const img=new Image();
  img.onload=()=>{
    const ratio = img.naturalWidth / img.naturalHeight;
    let ww, wh, waveX, waveY;
    // 縦固定レイアウト：横幅一杯・高さ62%以内
    ww    = W;
    wh    = Math.min(W / ratio, H * 0.62);
    waveX = 0;
    waveY = 8;
    currentWave.waveW = ww;
    currentWave.h     = wh;
    currentWave.waveX = waveX;
    currentWave.y     = waveY;
    currentWave.ready=true;
    waveStartTime = performance.now();
    // gameLoopが未起動なら起動（showStageAnnounce経由でなく直接spawnWaveされた場合）
    if(!frameId){ lastTime=performance.now(); frameId=requestAnimationFrame(gameLoop); }
    // QRSスケジュール生成: bpmから10秒間のQRS発火時刻を計算
    qrsSchedule = [];
    const bpm = currentWave.q.bpm || 75;
    // ecg/18.jpg(VF)は拍動を2倍速に
    const isVF = currentWave.q.img === 'ecg/18.jpg';
    const intervalMs = (60000 / bpm) * (isVF ? 0.5 : 1);
    const ecgDurationMs = 10000;
    for(let t = intervalMs * 0.3; t < ecgDurationMs; t += intervalMs){
      qrsSchedule.push({ timeMs: t, lastCycle: -1 });
    }
    // 心臓・discharge 座標
    // ecg-areaの実際の高さを再取得（iPad Safariでレイアウト確定前にH=0になるのを防ぐ）
    const actualH = ecgArea.getBoundingClientRect().height || ecgArea.offsetHeight || H;
    if(actualH > 0) H = actualH;
    const ecgBottom2 = currentWave.y + currentWave.h;
    const ecgRight2  = currentWave.waveX + currentWave.waveW;
    const hImgW = (heartImg.complete && heartImg.naturalWidth > 0) ? heartImg.naturalWidth * 0.5 : 50;
    heartBaseSize = hImgW / 2;
    const areaBelow2 = H - ecgBottom2;
    heartY = Math.min(ecgBottom2 + Math.max(areaBelow2 * 0.15, 40), H - 60);
    heartX = ecgRight2 - hImgW / 2 - 4;
    // ヒントパネル：縦向きのみ canvas 内に絶対配置
    const hintEl2 = document.getElementById('hint-area');
    if(hintEl2 && hintEl2.parentElement === ecgArea){
      const panelH = hintEl2.offsetHeight || 80;
      const hintTop = heartY + (H - heartY) * 0.40;
      const clampedY = Math.min(hintTop, H - panelH - 4);
      hintEl2.style.top = clampedY + 'px';
      hintEl2.style.transform = 'translateX(-50%)';
    }
    // 放電をリセット or 引き継ぎ
    if(resetDanger){
      dischargeX = dischargeMinX;
      targetDischargeX = dischargeMinX;
    }

    // スポットライト
    if(stageEffects.spotlight){
      const isOni = getStageDef().st >= 19;
      const sr = Math.min(W,currentWave.h)*0.36*1.5 * (isOni ? 0.6 : 1);
      spotlight={
        x: W*0.5, y: currentWave.y+currentWave.h*0.5,
        tx:W*0.5, ty:currentWave.y+currentWave.h*0.5,
        r: sr, moveTimer:0
      };
    } else {
      spotlight=null;
    }
    // スライム: 保存位置があれば復元、なければ新規spawn
    if(stageEffects.slime){
      if(_savedSlimes.length > 0){
        slimes = _savedSlimes.map(s=>({...s})); // 同位置で再開
        _savedSlimes = [];
      } else if(slimes.length === 0){
        spawnSlimes();
      }
    } else {
      slimes=[];
      _savedSlimes=[];
    }
  };
  img.src=q.img;
  currentWave={img,waveX:0,waveW:W,y:20,h:80,
    speed:spd, rot, alive:true, ready:false, q};
  answered=false;
  buildLabels(q);
  // HUD進捗バーを現在のステージ進捗で更新
  updateHUD(getStageDef().st);
  // ヒントパネル更新
  const hintEl     = document.getElementById('hint-text');
  const hintArea   = document.getElementById('hint-area');
  const stageDef   = getStageDef();
  const hintStageEl= document.getElementById('hint-stage');
  const hintLbl    = document.getElementById('hint-label');
  if(hintEl && hintArea){
    hintEl.style.color = '';
    hintEl.style.fontSize = '';
    if(hintStageEl) hintStageEl.innerHTML = '';

    if(stageDef.st >= 19){
      // 鬼面：「・・・」固定・通常パネル
      hintArea.classList.remove('hidden');
      hintArea.classList.remove('oni-mode');
      if(hintLbl) hintLbl.style.display = '';
      hintEl.style.display = '';
      hintEl.innerHTML = '・・・';
      hintEl.style.color = 'rgba(255,200,0,0.45)';
      hintEl.style.fontSize = '13px';
      // hint-area内の進捗バーがあれば削除
      const oldProg = hintArea.querySelector('.oni-progress');
      if(oldProg) oldProg.remove();
    } else {
      // 表面・裏面：常にヒント表示
      hintArea.classList.remove('hidden');
      hintArea.classList.remove('oni-mode');
      if(hintLbl) hintLbl.style.display = '';
      hintEl.style.display = '';
      hintEl.innerHTML = q.hint || '';
    }
  }
}

function drawResultMark(){
  if(!resultMark || !currentWave || !currentWave.ready) return;
  const p = resultMark.progress;        // 0→1
  const cx = W / 2;
  const cy = currentWave.y + currentWave.h / 2;
  const R  = Math.min(W, currentWave.h) * 0.28;
  const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p; // easeInOut

  ctx.save();
  ctx.globalAlpha = Math.min(1, p * 3) * (p > 0.85 ? (1-p)*6.7 : 1);

  if(resultMark.type === 'ok'){
    // ── 丸 ──
    // 背景フラッシュ
    ctx.fillStyle = `rgba(0,255,120,${0.13 * ease})`;
    ctx.fillRect(0, currentWave.y, W, currentWave.h);
    // 大きな円（描画アニメ）
    const arcEnd = -Math.PI/2 + Math.PI*2 * ease;
    ctx.beginPath();
    ctx.arc(cx, cy, R, -Math.PI/2, arcEnd);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth   = R * 0.22;
    ctx.lineCap     = 'round';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur  = 30;
    ctx.stroke();
    // 中央グロー
    const gOk = ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.7);
    gOk.addColorStop(0, `rgba(0,255,120,${0.22*ease})`);
    gOk.addColorStop(1, 'rgba(0,255,120,0)');
    ctx.fillStyle = gOk;
    ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
  } else {
    // ── バツ ──
    // 背景フラッシュ
    ctx.fillStyle = `rgba(255,40,40,${0.15 * ease})`;
    ctx.fillRect(0, currentWave.y, W, currentWave.h);
    const arm = R * ease;
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth   = R * 0.22;
    ctx.lineCap     = 'round';
    ctx.shadowColor = '#ff2222';
    ctx.shadowBlur  = 30;
    // 1本目（左上→右下）
    ctx.beginPath();
    ctx.moveTo(cx - arm, cy - arm);
    ctx.lineTo(cx + arm, cy + arm);
    ctx.stroke();
    // 2本目（右上→左下）
    if(p > 0.4){
      const arm2 = R * Math.min(1,(p-0.4)/0.6) * ease;
      ctx.beginPath();
      ctx.moveTo(cx + arm2, cy - arm2);
      ctx.lineTo(cx - arm2, cy + arm2);
      ctx.stroke();
    }
    // 中央グロー
    const gNg = ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.7);
    gNg.addColorStop(0, `rgba(255,50,50,${0.2*ease})`);
    gNg.addColorStop(1, 'rgba(255,50,50,0)');
    ctx.fillStyle = gNg;
    ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

  // 緑フラッシュパーティクル
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    particles_arr.push({x:dischargeX,y:heartY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:1,decay:0.02+Math.random()*0.02,color:Math.random()<0.5?'#00ff88':'#88ffcc',r:2+Math.random()*4});
  }
  combo++;
  showCombo();
  const prevStage = getStage();
  questionCount++;
  stageQCount++;
  const newStage = getStage();
  const stageCleared = (newStage !== prevStage);

  // HUD進行バーを即時更新（ステージクリア時は100%表示）
  levelEl.textContent = prevStage;
  updateHUD(prevStage);
  if(stageCleared) stageQCount = 0;

  // 電離線: 正解で後退（鬼面は短縮量が半分）
  const _totalRange = (heartX - heartBaseSize) - dischargeMinX;
  const _correctRate = getStageDef().st >= 19 ? 0.125 : 0.25;
  targetDischargeX = Math.max(dischargeMinX, dischargeX - _totalRange * _correctRate);

  // 600ms待機してアニメを見せてから次へ
  setTimeout(()=>{
    if(currentWave) currentWave.alive=false;

    // ─ メダル獲得判定（各ステージクリア後）─
    if(prevStage===3 && stageCleared){

        showStageAnnounce(4, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===6 && stageCleared){
      earnMedalAndCelebrate(2, 3, 'omote', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(7, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===9 && stageCleared){
      earnMedalAndCelebrate(3, 4, 'omote', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(10, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===12 && stageCleared){
      earnMedalAndCelebrate(4, 5, 'ura', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(13, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===15 && stageCleared){
      earnMedalAndCelebrate(5, 6, 'ura', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(16, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===18 && stageCleared){
      earnMedalAndCelebrate(6, 7, 'ura', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(19, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    // 鬼面クリア判定（3段階）
    if(prevStage===21 && stageCleared){
      earnMedalAndCelebrate(7, 8, 'oni', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(22, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    if(prevStage===24 && stageCleared){
      earnMedalAndCelebrate(8, 9, 'oni', ()=>{
        stageQCount=0; slimes=[]; _savedSlimes=[]; spotlight=null; particles_arr=[];
        showStageAnnounce(25, ()=>spawnWave(pickQuestion(), true));
      }); return;
    }
    // ST27: 最終ステージ（questionCountが全q合計を超えるとstageCleared=falseになるため独自判定）
    const st27Def = STAGE_DEFS.find(d => d.st === 27);
    if(prevStage===27 && stageQCount >= (st27Def ? st27Def.q : 1)){
      stageQCount = 0;
      earnMedalAndCelebrate(9, 10, 'oni', ()=>{ returnToTop(); });
      return;
    }
    if(stageCleared){
      slimes=[];
      showStageAnnounce(newStage, ()=>spawnWave(pickQuestion(), true));
    } else {
      spawnWave(pickQuestion(), false);
    }
  }, 2000);
}

function waitDischargeSettled(cb){

      setTimeout(check, 50);
    }
  };
  setTimeout(check, 100);
}

    for(let i=0;i<count;i++){
      const ang = (Math.PI*2/count)*i;
      const spd = 3.5 + Math.random()*4.5;
      const isMain = i % 2 === 0;
      const [h,s,l] = isMain ? [mH+(Math.random()-0.5)*15, mS, mL+Math.random()*15]
                              : [sH+(Math.random()-0.5)*15, sS, sL+Math.random()*15];
      particles.push({
        x:rx, y:ry,
        vx:Math.cos(ang)*spd*(0.7+Math.random()*0.6),
        vy:Math.sin(ang)*spd*(0.7+Math.random()*0.6),
        life:1, decay:0.007+Math.random()*0.007,
        hue:h, sat:s, lit:l,
        r:2+Math.random()*2.5, type:'main'
      });
    }
    // スパーク（白→パレット色に変化）
    for(let i=0;i<35;i++){
      const ang = Math.random()*Math.PI*2;
      const spd = 1.5 + Math.random()*3;
      particles.push({
        x:rx, y:ry,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        life:1, decay:0.018+Math.random()*0.015,
        hue:mH, sat:80, lit:92, r:1.2+Math.random()*1.8, type:'glitter'
      });
    }
    fireworks.push({particles, done:false});
    fireworks.push({flash:{x:rx,y:ry,hue:mH,r:70,life:1}, done:false});
  }

  let running = true;
  let btnShown = false;
  const startTs = performance.now();

  function cleanup(){
    running = false;
    if(celebFrameId){ cancelAnimationFrame(celebFrameId); celebFrameId = null; }
    const c2 = document.getElementById('celeb-canvas'); if(c2) c2.remove();
    const b2 = document.getElementById('celeb-next-btn'); if(b2) b2.remove();
  }

  function showBtn(){
    if(btnShown) return;
    btnShown = true;
    const btn = document.createElement('img');
    btn.id = 'celeb-next-btn';
    btn.src = btnSrc;
    const btnBottom = Math.max(20, Math.min(120, cH * 0.12));
    btn.style.cssText = `position:absolute;bottom:${btnBottom}px;left:50%;transform:translateX(-50%);width:min(260px,75%);cursor:pointer;z-index:31;filter:drop-shadow(0 0 12px rgba(0,255,136,0.4));transition:transform .12s,filter .12s;`;
    btn.addEventListener('mouseover', ()=>{ btn.style.transform='translateX(-50%) scale(1.04)'; btn.style.filter='drop-shadow(0 0 20px rgba(0,255,136,0.55))'; });
    btn.addEventListener('mouseout',  ()=>{ btn.style.transform='translateX(-50%)';             btn.style.filter='drop-shadow(0 0 12px rgba(0,255,136,0.4))'; });
    btn.addEventListener('mousedown', ()=>{ btn.style.transform='translateX(-50%) scale(0.97)'; });
    btn.addEventListener('mouseup',   ()=>{ btn.style.transform='translateX(-50%) scale(1.04)'; });
    btn.onclick = () => {
      cleanup();
      if(cb){
        dischargeX = dischargeMinX;
        targetDischargeX = dischargeMinX;
        gameState = 'paused';
        // ボタンを押した瞬間にHUD・ヒント・control-panelを即座に非表示
        const uiEl = document.getElementById('ui');
        const cpEl = document.getElementById('control-panel');
        const hintEl = document.getElementById('hint-area');
        if(uiEl) uiEl.style.display = 'none';
        if(cpEl) cpEl.style.display = 'none';
        if(hintEl) hintEl.classList.add('hidden');
        // canvasを黒塗り
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#000008';
        ctx.fillRect(0,0,W,H);
        cb();
      } else {
        returnToTop();
      }
    };
    gc.appendChild(btn);
  }

  // メダル番号に応じた詳細テキスト
  const clearTextMap = {
    1:'表面10クリア！', 2:'表面30クリア！', 3:'表面100クリア！',
    4:'裏面10クリア！', 5:'裏面30クリア！', 6:'裏面100クリア！',
    7:'鬼面10クリア！', 8:'鬼面30クリア！', 9:'鬼面100クリア！'
  };
  const faceLabel = type==='omote' ? '表面' : type==='ura' ? '裏面' : '鬼面';
  const clearText = _mnum ? (clearTextMap[_mnum] || faceLabel+'クリア！') : faceLabel+'クリア！';

  // 星を描画（独立canvas用・drawBgを使わず直接描画）
  function drawCelebBg(){
    cc.fillStyle = '#000008';
    cc.fillRect(0, 0, cW, cH);
  }

  let celebLastTs = null;
  function loop(ts){
    if(!running) return;
    const dt2 = celebLastTs !== null ? Math.min(ts - celebLastTs, 32) : 16;
    celebLastTs = ts;
    const elapsed = ts - startTs;

    cc.clearRect(0, 0, cW, cH);
    drawCelebBg();

    if(isFinalMedal){
      // ── 花火（5秒間） ──
      if(elapsed < FW_DURATION && elapsed > nextRocketTs){
        launchRocket();
        nextRocketTs = elapsed + 350 + Math.random()*500;
      }

      // ロケット更新・描画
      for(let i=rockets.length-1;i>=0;i--){
        const rk = rockets[i];
        if(rk.exploded){ rockets.splice(i,1); continue; }
        rk.x += rk.vx; rk.y += rk.vy;
        // 目標Y座標に達したら爆発
        if(rk.y <= rk.targetY){
          explodeFirework(rk.x, rk.targetY, rk.hue);
          rockets.splice(i,1); continue;
        }
        // 軌跡
        rk.trail.push({x:rk.x, y:rk.y});
        if(rk.trail.length > 10) rk.trail.shift();
        // 軌跡描画
        for(let j=0;j<rk.trail.length;j++){
          const a = j/rk.trail.length * 0.7;
          cc.beginPath();
          cc.arc(rk.trail[j].x, rk.trail[j].y, 1.5, 0, Math.PI*2);
          cc.fillStyle = `hsla(${rk.hue},100%,88%,${a*0.9})`;
          cc.fill();
        }
        // ロケット本体
        cc.beginPath();
        cc.arc(rk.x, rk.y, 3, 0, Math.PI*2);
        cc.fillStyle = `hsla(${rk.hue},100%,90%,0.95)`;
        cc.fill();
      }

      // 爆発パーティクル描画
      for(const fw of fireworks){
        if(fw.flash){
          // フラッシュ
          fw.flash.life -= 0.15;
          if(fw.flash.life <= 0){ fw.done=true; continue; }
          const fg = cc.createRadialGradient(fw.flash.x,fw.flash.y,0,fw.flash.x,fw.flash.y,fw.flash.r*(1-fw.flash.life+0.5));
          fg.addColorStop(0, `hsla(${fw.flash.hue},100%,100%,${fw.flash.life})`);
          fg.addColorStop(0.5, `hsla(${fw.flash.hue},100%,85%,${fw.flash.life*0.6})`);
          fg.addColorStop(1, 'transparent');
          cc.beginPath(); cc.arc(fw.flash.x,fw.flash.y,fw.flash.r,0,Math.PI*2);
          cc.fillStyle=fg; cc.fill();
          continue;
        }
        let allDead = true;
        for(const p of fw.particles){
          p.x += p.vx; p.y += p.vy;
          p.vy += 0.05; // 重力
          p.vx *= 0.98; p.vy *= 0.98;
          p.life -= p.decay;
          if(p.life <= 0) continue;
          allDead = false;
          cc.save();
          const alpha = p.type==='glitter' ? Math.abs(Math.sin(p.life*20))*p.life : p.life*p.life;
          cc.globalAlpha = alpha;
          if(p.type==='glitter'){
            // キラキラ
            cc.fillStyle=`hsl(${p.hue},${p.sat}%,${p.lit}%)`;
            cc.beginPath(); cc.arc(p.x,p.y,p.r,0,Math.PI*2); cc.fill();
          } else {
            // メインパーティクル（グラデーション）
            const g = cc.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.5);
            g.addColorStop(0, `hsla(${p.hue},${p.sat}%,${Math.min(100,p.lit+35)}%,1)`);
            g.addColorStop(0.5, `hsla(${p.hue},${p.sat}%,${p.lit}%,0.8)`);
            g.addColorStop(1, `hsla(${p.hue},${p.sat}%,${p.lit}%,0)`);
            cc.beginPath(); cc.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
            cc.fillStyle=g; cc.fill();
          }
          cc.restore();
        }
        if(allDead) fw.done = true;
      }
      for(let i=fireworks.length-1;i>=0;i--){ if(fireworks[i].done) fireworks.splice(i,1); }
    } else {
      // ── 紙吹雪 ──
      const ca = Math.max(0, 1 - elapsed/5000);
      for(const c of confetti){
        c.x+=c.vx; c.y+=c.vy; c.rot+=c.rotV;
        if(c.y>cH+20){ c.y=-10; c.x=Math.random()*cW; }
        cc.save(); cc.translate(c.x,c.y); cc.rotate(c.rot);
        cc.fillStyle=c.color; cc.globalAlpha=ca;
        cc.fillRect(-c.r/2,-c.r/2,c.r,c.r);
        cc.restore();
      }
    }

    const fade = Math.min(1, elapsed/500);
    cc.save(); cc.globalAlpha=fade;
    cc.textAlign='center'; cc.textBaseline='middle';
    const fs = Math.floor(cW*0.055);
    cc.font=`bold ${fs}px "Helvetica Neue","Hiragino Sans","Yu Gothic",sans-serif`;

    cc.shadowColor='rgba(255,255,255,0.6)'; cc.shadowBlur=10; cc.fillStyle='rgba(255,255,255,0.92)';
    cc.fillText(clearText, cW/2, cH*0.10);

    const medalY = cH*0.18;
    if(mainImg.complete && mainImg.naturalWidth>0){
      const cw2=Math.min(cW*0.55,220), ch2=cw2*(mainImg.naturalHeight/mainImg.naturalWidth);
      cc.drawImage(mainImg,(cW-cw2)/2, medalY, cw2, ch2);
    }

    const medalBottom = medalY + Math.min(cW*0.55,220) * 1.05;
    cc.shadowColor='#ffdd00'; cc.shadowBlur=16; cc.fillStyle='#ffee88';
    if(_mnum === 9){
      cc.fillText('ECGチャレンジ完全制覇', cW/2, medalBottom + fs*1.1);
      cc.shadowBlur=0;
    } else {
      cc.fillText('メダル獲得！', cW/2, medalBottom + fs*1.1);
    }

    cc.restore();
    if(elapsed > 2000) showBtn();
    celebFrameId = requestAnimationFrame(loop);
  }
  celebFrameId = requestAnimationFrame(loop);
}

function gameLoop(ts){

  // playing/gameover以外はgameLoopを止める
  if(gameState==='celebration' ||
     gameState==='paused' ||
     (gameState==='idle' && !goState)){
    frameId=null;
    return;
  }

  ctx.clearRect(0,0,W,H);
  // 星スクロール：常に更新
  // ecgStarScroll -= dt * 0.025;  // 星削除済み

  // 心臓の実際の左端（heartX - heartBaseSize が正確な左端）
  const heartLeft = heartX - heartBaseSize;
  if(gameState==='playing' && currentWave && currentWave.alive && currentWave.ready){
    if(!answered){
      // 未回答: 放電が右へ自然前進（鬼面は2倍速）
      const isOni = getStageDef().st >= 19;
      const advance = currentWave.speed * (isOni ? 2 : 1);
      dischargeX += advance;
      targetDischargeX += advance;
    } else {
      // 回答済み: targetDischargeXに向けてイージング（伸び縮みアニメ）
      const diff = targetDischargeX - dischargeX;
      dischargeX += diff * 0.08;
    }
    // dischargeX または targetDischargeX が心臓左端に届いたらゲームオーバー
    if((dischargeX >= heartLeft || targetDischargeX >= heartLeft) && !window._goScheduled){
      window._goScheduled = true;
      dischargeX = Math.min(dischargeX, heartLeft); // 心臓にめり込まない
      targetDischargeX = dischargeX;
      answered = true; // 即座に入力ロック
      gameOver();
    }
  } else if(gameState==='playing' || gameState==='paused'){
    // 通常イージング
    const diff = targetDischargeX - dischargeX;
    dischargeX += diff * 0.08;
    // マーク進行
    if(resultMark && !resultMark.done){
      resultMark.progress = Math.min(1, resultMark.progress + 0.045);
    }
  } else if(gameState==='gameover' && goState){
    updateGoState(dt);
  }

// ─── 心臓拍動 ─────────────────────────────────────────────────────────────
function updateHeartBeat(dt){
  if(heartBeat.phase === 'beat'){
    heartBeat.t += dt;
    const dur = 350; // 拍動アニメ全体 ms
    const p = Math.min(1, heartBeat.t / dur);
    // 0→0.2: 急速に縮む (1.0→0.7)
    // 0.2→1.0: ゆっくり戻る (0.7→1.0)
    if(p < 0.2){
      heartBeat.scale = 1.0 - (p / 0.2) * 0.3;
    } else {
      heartBeat.scale = 0.7 + ((p - 0.2) / 0.8) * 0.3;
    }
    if(p >= 1){
      heartBeat.phase = 'idle';
      heartBeat.scale = 1.0;
    }
  } else {
    // idle時は静止（微細ゆらぎのみ）
    heartBeat.scale = 1.0 + Math.sin(performance.now() * 0.0015) * 0.012;
  }
}

function drawHeart(){
  if(heartY < 0) return;  // onload前はスキップ

  // ゲームオーバーシーケンス中の心臓描画
  if(goState){
    const gs = goState;
    if(gs.phase === 'vf' || gs.phase === 'fadeOut' || gs.phase === 'show'){
      // VF痙攣: 500bpmのスケール変化＋ランダムなふるえ
      const amp = 4;
      const ox = (Math.random()-0.5)*amp;
      const oy = (Math.random()-0.5)*amp;
      const flicker = 0.4 + Math.random()*0.6;
      const s = heartBeat.scale; // 500bpmの拍動スケール
      ctx.save();
      ctx.globalAlpha = flicker;
      ctx.translate(heartX+ox, heartY+oy);
      if(heartImg.complete && heartImg.naturalWidth > 0){
        const hw = heartImg.naturalWidth*0.5*s;
        const hh = heartImg.naturalHeight*0.5*s;
        ctx.drawImage(heartImg, -hw/2, -hh/2, hw, hh);
      }
      ctx.restore();
      return;
    }
    if(gs.phase === 'done') return;
  }

  const s = heartBeat.scale;

  ctx.save();
  ctx.translate(heartX, heartY);

  if(heartImg.complete && heartImg.naturalWidth > 0){
    const hw = heartImg.naturalWidth * 0.5 * s;
    const hh = heartImg.naturalHeight * 0.5 * s;
    ctx.drawImage(heartImg, -hw/2, -hh/2, hw, hh);
  } else {
    // fallback: 赤い円
    ctx.beginPath();
    ctx.arc(0, 0, heartBaseSize * 0.5 * s, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,30,30,0.8)';
    ctx.fill();
  }

  ctx.restore();
}

function drawGoStateEffects(){

  ctx.save();
  ctx.globalAlpha = alpha;

  if(gameoverImg.complete && gameoverImg.naturalWidth > 0){
    // gameover.webpを電離線のすぐ上に中央表示
    const imgW = Math.min(W * 0.7, gameoverImg.naturalWidth);

    const ix = (W - imgW) / 2;
    const iy = heartY - imgH - 60;  // 少し上に

  } else {
    // フォールバック：テキスト
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 36px "Courier New",monospace';

function drawDangerLine(){
  if(heartY < 0) return;  // onload前はスキップ
  const now = performance.now();
  const t = now * 0.02;
  const cy = heartY; // 心臓と同じ高さ

  // ── 左端の discharge.webp：半分サイズ＋左右首振り回転 ──
  // 左右にゆっくり首振り（±12度、周期約3秒）
  const swayAngle = Math.sin(now * 0.0021) * (Math.PI / 15);
  let dischargeOriginX = 8;
  if(waveImg.complete && waveImg.naturalWidth > 0){
    const dw = waveImg.naturalWidth  * 0.35;
    const dh = waveImg.naturalHeight * 0.35;
    // 画像の左端中央を回転の基点にする（画像左側を軸に首振り）
    const pivotX = dw * 0.2; // 左寄りを軸
    ctx.save();
    ctx.translate(pivotX, cy);
    ctx.rotate(swayAngle);
    ctx.drawImage(waveImg, -pivotX, -dh/2, dw, dh);
    ctx.restore();
    dischargeOriginX = dw * 0.55;
    dischargeMinX = dischargeOriginX; // 放電管辺縁を最小値として保持
  }
  const dischargeOriginY = cy;

  const cx = dischargeX; // 放電先端X
  if(cx <= dischargeOriginX + 2) return;

  // ── 放電ライン5本・青系カラー ──
  const lineCount = 5;
  for(let li = 0; li < lineCount; li++){
    const yOff = (li - (lineCount-1)/2) * 2.5;
    const pts = [];
    let px = dischargeOriginX, py = dischargeOriginY + yOff;
    pts.push([px, py]);
    while(px < cx){
      px += 8 + Math.random() * 10;
      py = cy + yOff + (Math.random()-0.5)*8 + Math.sin(px*0.04 + t + li)*2;
      pts.push([px, py]);
    }
    const drawPath = () => {
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    };

    ctx.save();
    // 外側グロー（青）
    drawPath();
    ctx.strokeStyle = `rgba(${40+li*8},${120+li*15},255,${0.20-li*0.01})`;
    ctx.lineWidth = 7 - li * 0.5;
    ctx.shadowColor = 'rgba(60,140,255,0.5)';
    ctx.shadowBlur = 14;
    ctx.stroke();
    // 中間放電（水色）
    drawPath();
    ctx.strokeStyle = `rgba(${80+li*8},${180+li*10},255,${0.55-li*0.04})`;
    ctx.lineWidth = 2.5 - li * 0.2;
    ctx.shadowBlur = 0;
    ctx.stroke();
    // 白芯（中央1本）
    if(li === 2){
      drawPath();
      ctx.strokeStyle = 'rgba(200,230,255,0.92)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    // 小スパーク（青白）：ゲームオーバー中は非表示
    if(gameState !== 'gameover'){
      for(let i=2; i<pts.length-2; i+=3){
        if(Math.random() < 0.35){
          ctx.beginPath();
          ctx.moveTo(pts[i][0], pts[i][1]);
          ctx.lineTo(pts[i][0]+(Math.random()-0.5)*10, pts[i][1]-5-Math.random()*10);
          ctx.strokeStyle='rgba(150,210,255,0.45)';
          ctx.lineWidth=1;
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

}

function drawWave(){

  if(!currentWave || !currentWave.alive || !currentWave.ready) return;
  // fadeEcg フェーズで半透明
  if(goState && goState.phase === 'fadeEcg'){
    ctx.globalAlpha = Math.max(0, goState.ecgAlpha);
  }

  const w = currentWave;

  if(!w.img.complete || w.img.naturalWidth===0) return;

  // ===== 心電図本体 =====
  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  if(w.rot){
    ctx.translate(w.waveX + w.waveW/2, w.y + w.h/2);
    ctx.rotate(w.rot);
    ctx.drawImage(w.img, -w.waveW/2, -w.h/2, w.waveW, w.h);
  }else{
    ctx.drawImage(w.img, w.waveX, w.y, w.waveW, w.h);
  }

  ctx.restore();
  ctx.globalAlpha = 1; // フェードアウト後リセット
}

  ctx.arcTo(bx + bw/2, by + bh/2, bx + bw/2 - r, by + bh/2, r);
  ctx.lineTo(bx - bw/2 + r, by + bh/2);
  ctx.arcTo(bx - bw/2, by + bh/2, bx - bw/2, by + bh/2 - r, r);

  ctx.arcTo(bx - bw/2, by - bh/2, bx - bw/2 + r, by - bh/2, r);

function drawParticles(){

// sizes: s=32, m=48, l=64 (半径ではなく画像の表示幅)
const SLIME_SIZES = [
  { key:'s', w:32,  r:16 },
  { key:'m', w:48,  r:24 },
  { key:'l', w:64,  r:32 },
];
const SLIME_IMGS = {};  // key -> Image

function preloadSlimeImages(){
  for(const s of SLIME_SIZES){
    const img = new Image();
    img.src = `slime_${s.key}.webp`;
    SLIME_IMGS[s.key] = img;
  }
}
preloadSlimeImages();

function spawnSlimes(){
  slimes = [];
  const stageDef = getStageDef();
  const count = stageDef.slimeCount || 3;
  const waveY = currentWave ? currentWave.y : 20;
  const waveH = currentWave ? currentWave.h : 80;
  // バウンド境界をスナップショットとして保持（心電図切替中も維持）
  const boundsTop = waveY;
  const boundsBot = waveY + waveH;
  for(let i=0;i<count;i++){
    const sdef = SLIME_SIZES[i % SLIME_SIZES.length];
    const side = Math.floor(Math.random()*4);
    let x,y,vx,vy;
    const spd=0.5+Math.random()*0.8, ang=(Math.random()-0.5)*Math.PI*0.5;
    if(side===0){x=sdef.r+Math.random()*(W-sdef.r*2);y=waveY-sdef.r;vx=Math.sin(ang)*spd;vy=Math.cos(ang)*spd;}
    else if(side===1){x=W+sdef.r;y=waveY+sdef.r+Math.random()*(waveH-sdef.r*2);vx=-Math.cos(ang)*spd;vy=Math.sin(ang)*spd;}
    else if(side===2){x=sdef.r+Math.random()*(W-sdef.r*2);y=waveY+waveH+sdef.r;vx=Math.sin(ang)*spd;vy=-Math.cos(ang)*spd;}
    else{x=-sdef.r;y=waveY+sdef.r+Math.random()*(waveH-sdef.r*2);vx=Math.cos(ang)*spd;vy=Math.sin(ang)*spd;}
    slimes.push({key:sdef.key,w:sdef.w,r:sdef.r,x,y,vx,vy,
      boundsTop, boundsBot,
      wobble:Math.random()*Math.PI*2,wobbleSpeed:0.08+Math.random()*0.06});
  }
}

function updateSlimes(){
  if(gameState === 'gameover') return;
  for(let i = 0; i < slimes.length; i++){
    const s = slimes[i];
    s.x += s.vx;
    s.y += s.vy;
    s.wobble += s.wobbleSpeed;

    // バウンド境界：スライム生成時に固定したboundsTop/Botを使用
    // （心電図切替中もずれないよう currentWave を参照しない）
    const wY = s.boundsTop !== undefined ? s.boundsTop : (currentWave ? currentWave.y   : 0);
    const wB = s.boundsBot !== undefined ? s.boundsBot : (currentWave ? currentWave.y + currentWave.h : H);
    if(s.x - s.r < 0)   { s.x = s.r;     s.vx =  Math.abs(s.vx); }
    if(s.x + s.r > W)   { s.x = W-s.r;   s.vx = -Math.abs(s.vx); }
    if(s.y - s.r < wY)  { s.y = wY+s.r;  s.vy =  Math.abs(s.vy); }
    if(s.y + s.r > wB)  { s.y = wB-s.r;  s.vy = -Math.abs(s.vy); }

    // スライム同士の衝突（簡易円判定）
    for(let j = i+1; j < slimes.length; j++){
      const t = slimes[j];
      const dx = t.x - s.x;
      const dy = t.y - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = s.r + t.r;
      if(dist < minDist && dist > 0.01){
        // 法線方向に速度を反射
        const nx = dx / dist;
        const ny = dy / dist;
        // 相対速度の法線成分を交換（弾性衝突）
        const dvn = (s.vx - t.vx)*nx + (s.vy - t.vy)*ny;
        if(dvn > 0){ // 近づいている時だけ処理
          s.vx -= dvn * nx; s.vy -= dvn * ny;
          t.vx += dvn * nx; t.vy += dvn * ny;
          // 重なり解消
          const overlap = (minDist - dist) / 2;
          s.x -= nx * overlap; s.y -= ny * overlap;
          t.x += nx * overlap; t.y += ny * overlap;
        }
      }
    }
  }
}

function drawSlimes(){
  if(!slimes.length) return;
  for(const s of slimes){
    const img = SLIME_IMGS[s.key];
    if(!img || !img.complete || img.naturalWidth === 0) continue;
    // ぷるぷるスケール
    const scX = 1 + Math.sin(s.wobble) * 0.08;
    const scY = 1 - Math.sin(s.wobble) * 0.06;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.scale(scX, scY);
    ctx.drawImage(img, -s.w/2, -s.w/2, s.w, s.w);
    ctx.restore();
  }
}

function updateSpotlight(){
  if(!spotlight || !currentWave) return;
  // スポットライトを目標位置へなめらかに追従
  spotlight.x += (spotlight.tx - spotlight.x) * 0.04;
  spotlight.y += (spotlight.ty - spotlight.y) * 0.04;
  // 一定間隔でランダムな目標位置を設定
  spotlight.moveTimer++;
  if(spotlight.moveTimer > 90 + Math.random()*60){
    spotlight.moveTimer = 0;
    const margin = spotlight.r * 0.6;
    spotlight.tx = margin + Math.random()*(W - margin*2);
    spotlight.ty = currentWave.y + margin
                 + Math.random()*(currentWave.h - margin*2);
  }
}

function drawSpotlight(){
  if(!stageEffects.spotlight) return;
  if(!spotlight || !currentWave || !currentWave.ready) return;
  const {x, y, r} = spotlight;
  const y0 = currentWave.y;
  const wh = currentWave.h;

  // オフスクリーンcanvasで暗闇マスクを作成
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  const oc2 = oc.getContext('2d');

  // 1) 暗闇で全体を塗りつぶす（上下を少し広げてエッジを消す）
  const pad = 20;
  oc2.fillStyle = 'rgba(0,0,0,0.93)';
  oc2.fillRect(0, y0 - pad, W, wh + pad*2);
  // 上端・下端をグラデーションでフェードアウトさせて境界線を消す
  const gTop = oc2.createLinearGradient(0, y0 - pad, 0, y0 + 6);
  gTop.addColorStop(0, 'rgba(0,0,0,0)');
  gTop.addColorStop(1, 'rgba(0,0,0,0.93)');
  oc2.globalCompositeOperation = 'source-over';
  oc2.fillStyle = gTop;
  oc2.fillRect(0, y0 - pad, W, pad + 6);
  const gBot = oc2.createLinearGradient(0, y0 + wh - 6, 0, y0 + wh + pad);
  gBot.addColorStop(0, 'rgba(0,0,0,0.93)');
  gBot.addColorStop(1, 'rgba(0,0,0,0)');
  oc2.fillStyle = gBot;
  oc2.fillRect(0, y0 + wh - 6, W, pad + 6);

  // 2) スポット部分を destination-out で透明に抜く
  oc2.globalCompositeOperation = 'destination-out';
  const gSpot = oc2.createRadialGradient(x,y,0, x,y,r);
  gSpot.addColorStop(0,    'rgba(0,0,0,1)');
  gSpot.addColorStop(0.6,  'rgba(0,0,0,0.85)');
  gSpot.addColorStop(0.85, 'rgba(0,0,0,0.3)');
  gSpot.addColorStop(1,    'rgba(0,0,0,0)');
  oc2.beginPath();
  oc2.arc(x, y, r, 0, Math.PI*2);
  oc2.fillStyle = gSpot;
  oc2.fill();

  // 3) 本体canvasに重ねる
  ctx.drawImage(oc, 0, 0);

  // 4) スポット縁のグロー（温かみのある光輪）
  ctx.save();
  const gGlow = ctx.createRadialGradient(x,y,r*0.75, x,y,r*1.2);
  gGlow.addColorStop(0,   'rgba(255,220,120,0)');
  gGlow.addColorStop(0.5, 'rgba(255,200,80,0.13)');
  gGlow.addColorStop(1,   'rgba(255,180,50,0)');
  ctx.beginPath();
  ctx.arc(x, y, r*1.2, 0, Math.PI*2);
  ctx.fillStyle = gGlow;
  ctx.fill();
  ctx.restore();
}

function updateHUD(st){
  const faceDisp  = document.getElementById('face-display');
  const stageDisp = document.getElementById('stage-display');
  const progBar   = document.getElementById('hud-progress-bar');
  if(st >= 19){
    if(faceDisp)  faceDisp.innerHTML = `<span style="color:#ff4400;text-shadow:0 0 8px rgba(255,80,0,0.8);">鬼面</span>`;
    if(stageDisp) stageDisp.innerHTML = `<span style="color:#ff4400;text-shadow:0 0 8px rgba(255,80,0,0.8);">ステージ${st}</span>`;
    if(progBar){ progBar.style.background = 'linear-gradient(90deg,#ff4400,#ff8800)'; progBar.style.boxShadow = '0 0 6px rgba(255,100,0,0.6)'; }
  } else if(st > 9){
    if(faceDisp)  faceDisp.innerHTML = `<span style="color:#ff88ff;text-shadow:0 0 8px rgba(255,100,255,0.5);">裏面</span>`;
    if(stageDisp) stageDisp.innerHTML = `<span style="color:#ff88ff;">ステージ${st}</span>`;
    if(progBar){ progBar.style.background = 'linear-gradient(90deg,#ff88ff,#cc44ff)'; progBar.style.boxShadow = '0 0 6px rgba(255,100,255,0.5)'; }
  } else {
    if(faceDisp)  faceDisp.innerHTML = `<span style="color:rgba(0,255,136,0.85);">表面</span>`;
    if(stageDisp) stageDisp.innerHTML = `<span style="color:rgba(0,255,136,0.85);text-shadow:0 0 8px rgba(0,255,136,0.4);">ステージ${st}</span>`;
    if(progBar){ progBar.style.background = 'linear-gradient(90deg,rgba(0,255,136,0.7),rgba(0,255,136,1))'; progBar.style.boxShadow = '0 0 6px rgba(0,255,136,0.5)'; }
  }
  // 進捗バー幅：現在ステージ内の正解数 / そのステージのq数
  if(progBar){
    const stageDef = STAGE_DEFS.find(d => d.st === st) || STAGE_DEFS[STAGE_DEFS.length-1];
    const stageTotal = stageDef.q || 1;
    const pct = Math.min(100, (stageQCount / stageTotal) * 100);
    progBar.style.width = pct + '%';
  }
}

// ゲームオーバー描画（gameLoop内で呼ばれる）
function updateGoState(dt){
  if(!goState) return;
  goState.t += dt;
  const t = goState.t;

  // 心臓を痙攣させる（500bpm相当）
  const vfInterval = 60000 / 500; // 120ms
  if(t - (goState.lastBeat||0) >= vfInterval){
    goState.lastBeat = t;
    heartBeat.phase = 'beat';
    heartBeat.t = 0;
  }

  // 2秒後にGAME OVERテキストを表示
  if(t > 2000 && !goState.textShown){
    goState.textShown = true;
  }

  // 5秒後にトップへ
  if(t > 8000 && !goState.done){
    goState.done = true;
    gameState = 'idle';
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#000008';
    ctx.fillRect(0,0,W,H);
    returnToTop();
    goState = null;
    frameId = null;
  }
}

function drawGameOverAnim(){
  if(!gameOverAnim) return;
  const p = gameOverAnim.progress; // 0→1
  const now = performance.now();

  // ── フェーズ分割 ──
  // 0.00-0.25: 画面が赤く染まる
  // 0.25-0.60: DANGER LINE が画面全体を覆う（赤い稲妻）
  // 0.60-0.85: GAME OVERテキスト降下
  // 0.85-1.00: フェードアウト→オーバーレイへ

  ctx.save();

  // ─ 赤フラッシュ ─
  if(p < 0.35){
    const a = (p/0.35);
    const ease = a*a*(3-2*a);
    // 画面周囲から中央へ赤が迫るヴィネット
    const vg = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.max(W,H)*0.75);
    vg.addColorStop(0,   `rgba(180,0,0,0)`);
    vg.addColorStop(0.55,`rgba(180,0,0,${0.25*ease})`);
    vg.addColorStop(1,   `rgba(220,0,0,${0.75*ease})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
    // 画面全体の赤オーバーレイ
    ctx.fillStyle=`rgba(150,0,0,${0.18*ease})`;
    ctx.fillRect(0,0,W,H);
  }

  // ─ 電離線が全体を覆う ─
  if(p >= 0.15 && p < 0.72){
    const lp = Math.min(1,(p-0.15)/0.57);
    const ease = lp<0.5?2*lp*lp:-1+(4-2*lp)*lp;
    // 複数の赤い横線が画面を埋める
    const lineCount = Math.floor(ease * 18)+1;
    for(let i=0;i<lineCount;i++){
      const ly = (i/(lineCount)) * H * ease + (now*0.04+i*37)%40 - 20;
      const sinAmp = 6 + Math.sin(now*0.003+i)*4;
      ctx.beginPath();
      for(let x=0;x<=W;x+=4){
        const y2 = ly + Math.sin(x*0.06+now*0.008+i)*sinAmp;
        x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
      }
      ctx.strokeStyle=`rgba(255,${30+i*8},${30+i*4},${0.55*ease})`;
      ctx.lineWidth=1.5+Math.random()*1;
      ctx.shadowColor='#ff0000'; ctx.shadowBlur=8;
      ctx.stroke();
    }
    // 全体を赤く
    ctx.fillStyle=`rgba(120,0,0,${0.30*ease})`;
    ctx.fillRect(0,0,W,H);
  }

  // ─ GAME OVER テキスト（上端固定） ─
  if(p >= 0.10){
    const tp = Math.min(1,(p-0.10)/0.20);
    const ease = tp<0.5?2*tp*tp:-1+(4-2*tp)*tp;
    const ty = 36;

    const tg = ctx.createRadialGradient(W/2,ty,0,W/2,ty,160);
    tg.addColorStop(0,'rgba(200,0,0,0.45)');
    tg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=tg; ctx.fillRect(0,0,W,ty+80);

    const shake = (Math.random()-0.5)*4*ease;
    ctx.font='bold 38px "Courier New",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=30;
    ctx.fillStyle=`rgba(255,40,40,${ease})`;
    ctx.fillText('GAME OVER', W/2+shake, ty+shake);
    ctx.shadowBlur=8;
    ctx.fillStyle=`rgba(255,160,160,${ease*0.6})`;
    ctx.fillText('GAME OVER', W/2+shake, ty+shake);
  }

  // ─ フェードアウト ─
  if(p >= 0.85){
    const fp=(p-0.85)/0.15;
    ctx.fillStyle=`rgba(0,0,0,${fp*0.92})`;
    ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}

let _overlayStarsRaf = null;
function startOverlayStars(){
  const cv = document.getElementById('overlay-stars');
  if(!cv) return;
  if(_overlayStarsRaf){ cancelAnimationFrame(_overlayStarsRaf); _overlayStarsRaf=null; }
  const cx = cv.getContext('2d');
  let W2, H2;
  function init(){
    W2 = cv.width  = cv.offsetWidth  || window.innerWidth;
    H2 = cv.height = cv.offsetHeight || window.innerHeight;
    cx.fillStyle='#000008';
    cx.fillRect(0,0,W2,H2);
  }
  function draw(){ cx.fillStyle='#000008'; cx.fillRect(0,0,W2,H2); }
  init();
  window.addEventListener('resize', init);
  function loop(){ draw(); _overlayStarsRaf=requestAnimationFrame(loop); }
  loop();
}

function handleStartBtn(){
  const btn = document.getElementById('start-btn');
  const src = btn ? (btn.getAttribute('src') || '') : '';
  const stStartMap = {
    '1': ()=>startGame(),
    '2': ()=>startGameFrom(4),
    '3': ()=>startGameFrom(7),
    '4': ()=>startGameFrom(10),
    '5': ()=>startGameFrom(12),
    '6': ()=>startGameFrom(15),
    '7': ()=>startGameFrom(19),
    '8': ()=>startGameFrom(22),

function startGame(){
  overlay.style.display='none';
  if(_overlayStarsRaf){ cancelAnimationFrame(_overlayStarsRaf); _overlayStarsRaf=null; }
  if(frameId) cancelAnimationFrame(frameId);
  if(celebFrameId){ cancelAnimationFrame(celebFrameId); celebFrameId=null; }
  gameState='paused'; // showStageAnnounce終了時に'playing'に変わる
  initGame();
  // ステージ1のアナウンスを表示してからゲーム開始
  showStageAnnounce(1, ()=>spawnWave(pickQuestion(), true));
}

// 裏面（ST11）または鬼面（ST21）から直接開始
function startGameFrom(startSt){
  overlay.style.display='none';
  if(_overlayStarsRaf){ cancelAnimationFrame(_overlayStarsRaf); _overlayStarsRaf=null; }
  if(frameId) cancelAnimationFrame(frameId);
  if(celebFrameId){ cancelAnimationFrame(celebFrameId); celebFrameId=null; }
  gameState='paused'; // showStageAnnounce終了時に'playing'に変わる

  // initGameの処理を流用しつつ、questionCountを開始ステージ直前に設定
  score=0; level=1; combo=0; stageQCount=0; window._goScheduled=false;
  updateHUD(startSt);
  levelEl.textContent = startSt === 21 ? '21' : String(startSt);
  particles_arr=[]; currentWave=null; usedIndices=[]; answered=false;
  labelsRow.innerHTML=''; labelData=[];
  slimes=[]; dischargeX=dischargeMinX; targetDischargeX=dischargeMinX; spotlight=null;
  stageEffects={slime:false,spotlight:false,invert:false};
  const _ha=document.getElementById('hint-area');
  if(_ha){ _ha.classList.add('hidden'); }
  heartBeat={scale:1.0, phase:'idle', t:0};
  goState=null;
  heartX=0; heartY=-999;
  qrsSchedule=[]; waveStartTime=0;
  QUESTIONS=makeQuestions();

  // questionCountを開始ステージの先頭に合わせる
  let qcOffset = 0;
  for(const d of STAGE_DEFS){
    if(d.st >= startSt) break;
    qcOffset += d.q;
  }
  questionCount = qcOffset;

  // control-panelとUIはshowStageAnnounce内で管理される
  showStageAnnounce(startSt, ()=>spawnWave(pickQuestion(), true));
}

// start-btn のクリック処理は onclick="handleStartBtn()" で管理（returnToTop後も復元される）
applyMedalState();

// 現在のヒント文（互換用・使用箇所なし）
let currentHintContent = '';

// 初期適用（hint-areaは hidden のまま開始）

// ── 虫眼鏡機能 ────────────────────────────────────────────────────────────
(function(){
  const ZOOM = 3;          // 拡大倍率
  const LENS_R = 90;       // 虫眼鏡の半径(px)
  const BORDER = 3;        // 枠の太さ
  let active = false;
  let lensX = 0, lensY = 0; // canvas座標系でのタッチ位置



  function getCanvasPos(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (W / rect.width),
      y: (clientY - rect.top)  * (H / rect.height),
    };
  }

  // エフェクト用スナップショット（canvasと同じ実ピクセルサイズ）
  const snapCanvas = document.createElement('canvas');
  const snapCtx = snapCanvas.getContext('2d');

  function drawLens(){
    if(!active || !currentWave || !currentWave.ready || !currentWave.alive) return;
    const w = currentWave;
    if(!w.img.complete || w.img.naturalWidth===0) return;

    const cx = lensX, cy = lensY;
    const dpr = window.devicePixelRatio || 1;

    // ── ハイブリッド方式 ──────────────────────────────────────────────
    // レイヤー1: 元画像から直接切り出し（高画質・スポットライト前の状態）
    // レイヤー2: canvasスナップショットからエフェクト部分のみ合成
    // （スポットライトマスク・スライム・パーティクル）

    // 元画像→canvas座標の変換係数
    const imgScaleX = w.img.naturalWidth  / w.waveW;
    const imgScaleY = w.img.naturalHeight / w.h;

    // タッチ位置の元画像上の対応ピクセル
    // 反転面では切り出し座標も反転（動きを合わせるため）
    let relX = (cx - w.waveX) / w.waveW;
    let relY = (cy - w.y)     / w.h;
    if(w.rot){ relX = 1 - relX; relY = 1 - relY; }
    const imgCx = relX * w.img.naturalWidth;
    const imgCy = relY * w.img.naturalHeight;

    // 元画像から切り出す範囲（LENS_R/ZOOM px 分）
    const srcHalfW = (LENS_R / ZOOM) * imgScaleX;
    const srcHalfH = (LENS_R / ZOOM) * imgScaleY;
    const sx  = Math.max(0, imgCx - srcHalfW);
    const sy  = Math.max(0, imgCy - srcHalfH);
    const sx2 = Math.min(w.img.naturalWidth,  imgCx + srcHalfW);
    const sy2 = Math.min(w.img.naturalHeight, imgCy + srcHalfH);
    const sw = sx2 - sx, sh = sy2 - sy;
    const dw = sw / imgScaleX * ZOOM;
    const dh = sh / imgScaleY * ZOOM;
    const dx = cx - (imgCx - sx) / imgScaleX * ZOOM;
    const dy = cy - (imgCy - sy) / imgScaleY * ZOOM;

    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    // 円クリップ
    ctx.beginPath();
    ctx.arc(cx, cy, LENS_R, 0, Math.PI*2);
    ctx.clip();

    // ── レイヤー1: 元画像から高画質で直接描画 ──
    ctx.fillStyle = '#000008';
    ctx.fill(); // 背景黒
    if(w.rot){
      // 反転面: レンズ中心(cx,cy)を軸に180度回転して描画
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.PI);
      ctx.translate(-cx, -cy);
      ctx.drawImage(w.img, sx, sy, sw, sh, dx, dy, dw, dh);
      ctx.restore();
    } else {
      ctx.drawImage(w.img, sx, sy, sw, sh, dx, dy, dw, dh);
    }

    // ── レイヤー2: スポットライト暗闇マスクとスライムのみ合成 ──
    // 心電図ピクセルは上書きせず、エフェクトのみを正確に重ねる
    if(stageEffects && stageEffects.spotlight && spotlight){
      // スポットライトの暗闇をレンズ内座標で再描画
      // （元画像の高画質描画の上に暗闇だけを乗せる）
      const spCx = cx + (spotlight.x - cx) * ZOOM;
      const spCy = cy + (spotlight.y - cy) * ZOOM;
      const spR  = spotlight.r * ZOOM;

      // 暗闇レイヤー（心電図エリアをZOOM倍座標で覆う）
      const darkX = cx + (w.waveX - cx) * ZOOM;
      const darkY = cy + (w.y - cy) * ZOOM;
      const darkW = w.waveW * ZOOM;
      const darkH = w.h * ZOOM;

      // 一時canvasで destination-out マスクを作る
      const tmpC = document.createElement('canvas');
      tmpC.width = LENS_R*2; tmpC.height = LENS_R*2;
      const tmpX = tmpC.getContext('2d');

      // 1) 暗闇で全体を塗る
      tmpX.fillStyle = 'rgba(0,0,0,0.93)';
      tmpX.fillRect(0, 0, LENS_R*2, LENS_R*2);

      // 2) スポット位置をdestination-outで抜く（レンズ座標系に変換）
      tmpX.globalCompositeOperation = 'destination-out';
      const gSpot = tmpX.createRadialGradient(
        spCx-cx+LENS_R, spCy-cy+LENS_R, 0,
        spCx-cx+LENS_R, spCy-cy+LENS_R, spR
      );
      gSpot.addColorStop(0,    'rgba(0,0,0,1)');
      gSpot.addColorStop(0.6,  'rgba(0,0,0,0.85)');
      gSpot.addColorStop(0.85, 'rgba(0,0,0,0.3)');
      gSpot.addColorStop(1,    'rgba(0,0,0,0)');
      tmpX.beginPath();
      tmpX.arc(spCx-cx+LENS_R, spCy-cy+LENS_R, spR, 0, Math.PI*2);
      tmpX.fillStyle = gSpot;
      tmpX.fill();

      // 3) 心電図エリアのみにクリップして暗闇を合成
      ctx.drawImage(tmpC, 0, 0, LENS_R*2, LENS_R*2,
                    cx-LENS_R, cy-LENS_R, LENS_R*2, LENS_R*2);
    }

    // スライム: 画像を直接ZOOM倍で描画（高画質・スナップ不使用）
    if(stageEffects && stageEffects.slime && slimes && slimes.length > 0){
      for(const sl of slimes){
        if(Math.abs(sl.x - cx) > LENS_R/ZOOM + sl.w*1.5) continue;
        if(Math.abs(sl.y - cy) > LENS_R/ZOOM + sl.w*1.5) continue;
        const slImg = SLIME_IMGS[sl.key];
        if(!slImg || !slImg.complete || slImg.naturalWidth===0) continue;
        const slCx = cx + (sl.x - cx) * ZOOM;
        const slCy = cy + (sl.y - cy) * ZOOM;
        const slW  = sl.w * ZOOM;
        // wobbleスケールも反映
        const scX = 1 + Math.sin(sl.wobble) * 0.08;
        const scY = 1 - Math.sin(sl.wobble) * 0.06;
        ctx.save();
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.translate(slCx, slCy);
        ctx.scale(scX, scY);
        ctx.drawImage(slImg, -slW/2, -slW/2, slW, slW);
        ctx.restore();
      }
    }

    ctx.restore();

    // 枠（グラデーション）
    const grad = ctx.createRadialGradient(cx, cy, LENS_R - BORDER*3, cx, cy, LENS_R + BORDER);
    grad.addColorStop(0, 'rgba(200,230,255,0.95)');
    grad.addColorStop(1, 'rgba(60,140,255,0.3)');
    ctx.beginPath();
    ctx.arc(cx, cy, LENS_R, 0, Math.PI*2);
    ctx.strokeStyle = grad;
    ctx.lineWidth = BORDER * 2;
    ctx.stroke();

    // ハイライト（レンズ感）
    ctx.beginPath();
    ctx.arc(cx - LENS_R*0.25, cy - LENS_R*0.3, LENS_R*0.25, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fill();
  }

  // gameLoop末尾から呼ばれるフック
  window._magDrawLens = function(){
    if(!active) return;
    const hasEffects = stageEffects && (stageEffects.spotlight || stageEffects.slime);
    if(hasEffects){
      // エフェクトありの場合のみスナップショットを取る
      snapCanvas.width  = canvas.width;
      snapCanvas.height = canvas.height;
      snapCtx.setTransform(1, 0, 0, 1, 0, 0);
      snapCtx.drawImage(canvas, 0, 0);
    }
    drawLens();
  };

  function startLens(clientX, clientY){
    if(!currentWave || !currentWave.ready || !currentWave.alive) return;
    const pos = getCanvasPos(clientX, clientY);
    const w = currentWave;
    // 心電図エリア内のみ
    if(pos.x < w.waveX || pos.x > w.waveX + w.waveW ||
       pos.y < w.y      || pos.y > w.y + w.h) return;
    lensX = pos.x; lensY = pos.y;
    active = true;
  }

  function moveLens(clientX, clientY){
    if(!active) return;
    const pos = getCanvasPos(clientX, clientY);
    lensX = pos.x; lensY = pos.y;
  }

  function stopLens(){
    active = false;
  }

  // マウス
  canvas.addEventListener('mousedown', e=>{ startLens(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', e=>{ moveLens(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup',   ()=>{ stopLens(); });
  canvas.addEventListener('mouseleave',()=>{ stopLens(); });

  // タッチ
  canvas.addEventListener('touchstart', e=>{
    e.preventDefault();
    if(e.touches.length===1) startLens(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  canvas.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1) moveLens(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
  canvas.addEventListener('touchend', e=>{ e.preventDefault(); stopLens(); }, {passive:false});
})();
